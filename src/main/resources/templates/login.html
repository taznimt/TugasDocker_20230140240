<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Website Tasnim</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            margin: 0;
            padding: 0;
            color: #fff;
        }
        .container {
            width: 400px;
            margin: 80px auto;
            background: #ffffff;
            color: #1e293b;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        }
        h1 {
            margin-top: 0;
            text-align: center;
            color: #1d4ed8;
        }
        p {
            text-align: center;
            color: #475569;
        }
        label {
            display: block;
            margin-top: 14px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            margin-top: 18px;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #2563eb;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background: #1d4ed8;
        }
        .error {
            background: #fee2e2;
            color: #b91c1c;
            padding: 10px;
            border-radius: 10px;
            margin-top: 12px;
            text-align: center;
        }
        .badge {
            margin-top: 14px;
            text-align: center;
            font-size: 13px;
            color: #64748b;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Login Page</h1>
    <p>Website Tasnim - NIM 20230140240</p>

    <div th:if="${error}" class="error" th:text="${error}"></div>

    <form th:action="@{/login}" method="post">
        <label>Username</label>
        <input type="text" name="username" placeholder="Masukkan username" required>

        <label>Password</label>
        <input type="password" name="password" placeholder="Masukkan password" required>

        <button type="submit">Login</button>
    </form>

    <div class="badge">
        Username: admin | Password: 20230140240
    </div>
</div>
</body>
</html>
