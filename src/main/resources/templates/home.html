<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Website Tasnim</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f8fafc;
            margin: 0;
            padding: 0;
            color: #0f172a;
        }
        .header {
            background: #0f172a;
            color: white;
            padding: 24px 40px;
        }
        .header h1 {
            margin: 0;
        }
        .header p {
            margin: 6px 0 0;
            color: #cbd5e1;
        }
        .container {
            padding: 30px 40px;
        }
        .nav {
            margin-bottom: 20px;
        }
        .nav a {
            display: inline-block;
            margin-right: 10px;
            padding: 10px 14px;
            text-decoration: none;
            border-radius: 10px;
            background: #2563eb;
            color: white;
        }
        .nav a.logout {
            background: #dc2626;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
        }
        th, td {
            border: 1px solid #cbd5e1;
            padding: 12px;
            text-align: center;
        }
        th {
            background: #2563eb;
            color: white;
        }
        .empty {
            color: #64748b;
            text-align: center;
            margin-top: 10px;
        }
        .success {
            background: #dcfce7;
            color: #166534;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 16px;
        }
        .footer-note {
            margin-top: 18px;
            font-size: 14px;
            color: #475569;
        }
    </style>
</head>
<body>
<div class="header">
    <h1 th:text="${title}"></h1>
    <p th:text="${subtitle}"></p>
</div>

<div class="container">
    <div class="nav">
        <a th:href="@{/form}">Input Data Mahasiswa</a>
        <a th:href="@{/logout}" class="logout">Logout</a>
    </div>

    <div th:if="${success}" class="success" th:text="${success}"></div>

    <div class="card">
        <h2>Data Mahasiswa</h2>

        <table>
            <thead>
            <tr>
                <th>No</th>
                <th>Nama</th>
                <th>NIM</th>
                <th>Jenis Kelamin</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(dataMahasiswa)}">
                <td colspan="4">Belum ada data</td>
            </tr>
            <tr th:each="item, stat : ${dataMahasiswa}">
                <td th:text="${stat.count}"></td>
                <td th:text="${item.nama}"></td>
                <td th:text="${item.nim}"></td>
                <td th:text="${item.jenisKelamin}"></td>
            </tr>
            </tbody>
        </table>

        <div class="footer-note">
            Data bersifat sementara dan tidak disimpan ke database.
        </div>
    </div>
</div>
</body>
</html>
