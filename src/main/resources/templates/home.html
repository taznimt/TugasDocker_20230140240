<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Website Tasnim</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #fdf2f8, #f3e8ff, #fae8ff);
            margin: 0;
            padding: 0;
            color: #4c1d95;
        }

        .header {
            background: linear-gradient(135deg, #f472b6, #c084fc);
            color: white;
            padding: 28px 40px;
            box-shadow: 0 8px 20px rgba(192, 132, 252, 0.22);
        }

        .header h1 {
            margin: 0;
        }

        .header p {
            margin: 8px 0 0;
            color: #fdf4ff;
        }

        .container {
            padding: 30px 40px;
        }

        .nav {
            margin-bottom: 20px;
        }

        .nav a {
            display: inline-block;
            margin-right: 10px;
            padding: 12px 16px;
            text-decoration: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #c084fc, #f472b6);
            color: white;
            font-weight: bold;
            box-shadow: 0 6px 15px rgba(244, 114, 182, 0.18);
        }

        .nav a.logout {
            background: linear-gradient(135deg, #fb7185, #f43f5e);
        }

        .card {
            background: rgba(255,255,255,0.95);
            padding: 24px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(216, 180, 254, 0.25);
            border: 2px solid #f5d0fe;
        }

        h2 {
            color: #a21caf;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
            overflow: hidden;
            border-radius: 16px;
        }

        th, td {
            border: 1px solid #f5d0fe;
            padding: 12px;
            text-align: center;
        }

        th {
            background: linear-gradient(135deg, #f9a8d4, #d8b4fe);
            color: white;
        }

        td {
            background: #fff;
        }

        .success {
            background: #f3e8ff;
            color: #7e22ce;
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 16px;
            border: 1px solid #d8b4fe;
        }

        .footer-note {
            margin-top: 18px;
            font-size: 14px;
            color: #7e22ce;
        }
    </style>
</head>
<body>
<div class="header">
    <h1 th:text="${title}"></h1>
    <p th:text="${subtitle}"></p>
</div>

<div class="container">
    <div class="nav">
        <a th:href="@{/form}">+ Input Data Mahasiswa</a>
        <a th:href="@{/logout}" class="logout">Logout</a>
    </div>

    <div th:if="${success}" class="success" th:text="${success}"></div>

    <div class="card">
        <h2>Data Mahasiswa 🌸</h2>

        <table>
            <thead>
            <tr>
                <th>No</th>
                <th>Nama</th>
                <th>NIM</th>
                <th>Jenis Kelamin</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(dataMahasiswa)}">
                <td colspan="4">Belum ada data 💕</td>
            </tr>
            <tr th:each="item, stat : ${dataMahasiswa}">
                <td th:text="${stat.count}"></td>
                <td th:text="${item.nama}"></td>
                <td th:text="${item.nim}"></td>
                <td th:text="${item.jenisKelamin}"></td>
            </tr>
            </tbody>
        </table>

        <div class="footer-note">
            Data mahasiswa sudah tersimpan ke database MySQL Workbench yaa ✨
        </div>
    </div>
</div>
</body>
</html>
