<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Mahasiswa</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #fdf2f8, #f3e8ff, #fae8ff);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 520px;
            margin: 60px auto;
            background: rgba(255,255,255,0.95);
            padding: 30px;
            border-radius: 26px;
            box-shadow: 0 12px 26px rgba(216, 180, 254, 0.25);
            border: 2px solid #f5d0fe;
        }

        h1 {
            text-align: center;
            color: #a21caf;
            margin-top: 0;
        }

        p {
            text-align: center;
            color: #7e22ce;
        }

        label {
            display: block;
            margin-top: 14px;
            font-weight: bold;
            color: #7e22ce;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            border: 2px solid #e9d5ff;
            border-radius: 14px;
            box-sizing: border-box;
            outline: none;
        }

        input:focus, select:focus {
            border-color: #f472b6;
            box-shadow: 0 0 0 4px rgba(244, 114, 182, 0.12);
        }

        .actions {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        button, a {
            flex: 1;
            text-align: center;
            padding: 12px;
            border: none;
            border-radius: 16px;
            text-decoration: none;
            font-size: 15px;
            cursor: pointer;
            font-weight: bold;
        }

        button {
            background: linear-gradient(135deg, #f472b6, #c084fc);
            color: white;
        }

        a {
            background: linear-gradient(135deg, #d8b4fe, #f9a8d4);
            color: white;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Form Input Mahasiswa 🌷</h1>
    <p>Isi data dengan manis yaa 💕</p>

    <form th:action="@{/save}" th:object="${user}" method="post">
        <label>Nama</label>
        <input type="text" th:field="*{nama}" placeholder="Masukkan nama" required>

        <label>NIM</label>
        <input type="text" th:field="*{nim}" placeholder="Masukkan NIM" required>

        <label>Jenis Kelamin</label>
        <select th:field="*{jenisKelamin}" required>
            <option value="">-- Pilih Jenis Kelamin --</option>
            <option value="Laki-laki">Laki-laki</option>
            <option value="Perempuan">Perempuan</option>
        </select>

        <div class="actions">
            <button type="submit">Simpan ✨</button>
            <a th:href="@{/home}">Kembali</a>
        </div>
    </form>
</div>
</body>
</html>
